# markdownlint configuration — relaxed where it conflicts with readable prose.
config:
  MD013: false   # no hard line-length limit; prose wraps naturally
  MD024: false   # repeated section names across a file are fine (e.g. "Open questions")
  MD033: false   # allow inline HTML (badges, callouts)
  MD034: false   # bare URLs occasionally appear in prose intentionally
  MD036: false   # italic "*Sources: ...*" attributions are intentional, not headings
  MD041: false   # first line need not be a heading (badges precede it)
  MD046: false   # don't enforce a single code-block style
globs:
  - "**/*.md"
ignores:
  - "blueprint/**"      # the master spec has its own formatting conventions
  - "node_modules/**"
