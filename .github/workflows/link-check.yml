name: link-check

on:
  pull_request:
    paths:
      - "**/*.md"
  schedule:
    - cron: "0 6 * * 1"  # weekly, catches link rot
  workflow_dispatch:

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --accept 200,429 './**/*.md'
          fail: true
