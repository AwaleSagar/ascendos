name: markdownlint

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/markdownlint.yml"
      - ".markdownlint-cli2.yaml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".github/workflows/markdownlint.yml"
      - ".markdownlint-cli2.yaml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The action reads rules, globs, and ignores from .markdownlint-cli2.yaml.
      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: ""
