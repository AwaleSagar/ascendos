name: markdownlint

on:
  pull_request:
    paths:
      - "**/*.md"
  push:
    branches: [main]
    paths:
      - "**/*.md"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Install then run cli2 directly; it reads globs and ignores from
      # .markdownlint-cli2.yaml.
      - run: npm install -g markdownlint-cli2
      - run: markdownlint-cli2
