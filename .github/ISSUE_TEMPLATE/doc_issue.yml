name: Documentation issue
description: Something in the docs is wrong, unclear, broken, or missing.
labels: ["docs"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's wrong?
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Where? (file path or URL)
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix (optional)
