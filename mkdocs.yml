site_name: AscendOS
site_description: A capability-based ARM64 microkernel — design blueprint.
site_author: AwaleSagar
repo_url: https://github.com/AwaleSagar/ascendos
repo_name: AwaleSagar/ascendos
copyright: "Docs licensed CC BY 4.0"

theme:
  name: material
  palette:
    - scheme: default
      primary: red
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Dark mode
    - scheme: slate
      primary: red
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Overview:
      - Motivation: overview/motivation.md
      - Design principles: overview/design-principles.md
      - Non-goals: overview/non-goals.md
  - Architecture:
      - Index: architecture/README.md
      - Boot: architecture/boot.md
      - Microkernel: architecture/microkernel.md
      - Capabilities: architecture/capabilities.md
      - Scheduling: architecture/scheduling.md
      - Memory: architecture/memory.md
      - IPC: architecture/ipc.md
      - Drivers: architecture/drivers.md
      - Storage: architecture/storage.md
      - Networking: architecture/networking.md
      - Security: architecture/security.md
      - Packaging: architecture/packaging.md
      - Observability: architecture/observability.md
  - Decisions (ADRs):
      - Index: adr/README.md
      - 0001 Pure capability model: adr/0001-pure-capability-model.md
      - 0002 User-space drivers: adr/0002-userspace-drivers.md
      - 0003 Ring-based syscalls: adr/0003-ring-based-syscall-interface.md
      - 0004 No native kernel modules: adr/0004-no-native-kernel-modules.md
  - RFC process: rfcs/README.md
  - Diagrams: diagrams/README.md
  - Glossary: glossary.md
  - FAQ: faq.md
